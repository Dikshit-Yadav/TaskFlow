<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <!-- Checkmark Glow Gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield/Rounded Box -->
  <rect x="10" y="10" width="80" height="80" rx="24" fill="url(#bgGrad)" shadow="0 10px 20px rgba(0,0,0,0.3)" />

  <!-- Flow Lines (Abstract background elements in the icon) -->
  <path d="M 25 35 Q 40 25 55 35 T 75 35" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="6" stroke-linecap="round" />
  <path d="M 25 50 Q 40 40 55 50 T 75 50" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="6" stroke-linecap="round" />
  <path d="M 25 65 Q 40 55 55 65 T 75 65" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="6" stroke-linecap="round" />

  <!-- The TaskFlow Symbol: Dynamic Checkmark + Flow Loop -->
  <path d="M 32 50 L 45 63 L 68 37" fill="none" stroke="url(#checkGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Dot Accent -->
  <circle cx="68" cy="30" r="3.5" fill="#22C55E" />
</svg>
