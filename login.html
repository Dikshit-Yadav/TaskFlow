<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Login | TaskFlow</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- jQuery UI CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="stylesheet" href="./css/responsive.css">

</head>

<body>

    <!-- Page Content -->
    <div class="auth-container">

        <div class="auth-left">

            <div class="logo">
                <i class="fa-solid fa-list-check"></i>
                <h1>TaskFlow</h1>
            </div>

            <h2>Welcome Back</h2>

            <p>
                Sign in to continue managing your tasks and projects.
            </p>

            <form id="loginForm" novalidate>

                <div class="input-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email">

                    <small class="error" id="emailError"></small>

                </div>

                <div class="input-group">

                    <label for="password">
                        Password
                    </label>

                    <div class="password-wrapper">

                        <input type="password" id="password" name="password" placeholder="Enter your password"
                            autocomplete="current-password">

                        <button type="button" id="togglePassword">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                    <small class="error" id="passwordError"></small>

                </div>

                <div class="options">

                    <label class="remember">

                        <input type="checkbox" id="remember">

                        Remember Me

                    </label>

                    <a href="forgot-password.html">

                        Forgot Password?

                    </a>

                </div>

                <button class="btn-login" type="submit">

                    Login

                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="social-buttons">

                <button>
                    <i class="fa-brands fa-google"></i>

                    Google
                </button>

                <button>
                    <i class="fa-brands fa-github"></i>

                    GitHub
                </button>

            </div>

            <p class="register-link">

                Don't have an account?

                <a href="register.html">
                    Register
                </a>

            </p>

        </div>

        <!-- Right Section -->

        <div class="auth-right">

            <div class="hero-content">

                <i class="fa-solid fa-list-check hero-icon"></i>

                <h2>Organize Everything</h2>

                <p>

                    Manage tasks, projects, deadlines,
                    and productivity in one place.

                </p>

            </div>

        </div>

    </div>


    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- jQuery UI -->
    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>

    <!-- JS -->
    <script src="./js/app.js"></script>
    <script src="./js/validation.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/login.js"></script>
</body>

</html>
